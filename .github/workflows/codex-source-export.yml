name: Codex Source Export
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: adeeb-source
          path: .
          include-hidden-files: true
          retention-days: 1
