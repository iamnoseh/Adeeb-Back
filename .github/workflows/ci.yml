name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ADEEB-V2

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Adeeb.slnx

      - name: Build
        run: dotnet build Adeeb.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Adeeb.slnx --no-build --configuration Release --verbosity normal

      - name: Build warnings as errors
        run: dotnet build Adeeb.slnx --no-restore --configuration Release -warnaserror
