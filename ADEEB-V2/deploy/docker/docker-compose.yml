services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: adeeb_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adeeb_v2"]
      interval: 10s
      timeout: 5s
      retries: 5
